version: "3.9"

services:

  # ── PostgreSQL Database ──────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: luminalib_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lumina}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lumina}
      POSTGRES_DB: ${POSTGRES_DB:-luminalib}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lumina}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Ollama (Local LLM — Llama 3) ────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: luminalib_ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s


  # ── Ollama Model Puller (one-shot init) ─────────────────────────────────────
  ollama-init:
    image: curlimages/curl:latest
    container_name: luminalib_ollama_init
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"
    entrypoint: >
      sh -c "curl -sf -X POST http://ollama:11434/api/pull
      -H 'Content-Type: application/json'
      -d '{\"name\": \"llama3\", \"stream\": false}'"

  # ── MinIO (S3-compatible object storage) ────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: luminalib_minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── MinIO Bucket Init ────────────────────────────────────────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: luminalib_minio_init
    depends_on:
      minio:
        condition: service_healthy
    restart: "no"
    entrypoint: >
      sh -c "
      mc alias set local http://minio:9000 ${S3_ACCESS_KEY:-minioadmin} ${S3_SECRET_KEY:-minioadmin} &&
      mc mb --ignore-existing local/${S3_BUCKET_NAME:-luminalib-books}
      "

  # ── LuminaLib API ────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: luminalib_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-lumina}:${POSTGRES_PASSWORD:-lumina}@db:5432/${POSTGRES_DB:-luminalib}
      OLLAMA_BASE_URL: http://ollama:11434
      S3_ENDPOINT_URL: http://minio:9000
    volumes:
      - book_storage:/app/storage
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

volumes:
  postgres_data:
  ollama_data:
  minio_data:
  book_storage:
